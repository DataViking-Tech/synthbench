name: Regenerate Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/synthbench/publish.py'
      - 'leaderboard-results/**'
      - 'site/**'

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: pip install -e .

      # Export JSON data for the Astro site
      - run: synthbench publish-data --results-dir leaderboard-results --output site/src/data/leaderboard.json

      # Build the Astro site
      - name: Build Astro site
        working-directory: site
        run: |
          npm ci
          npx biome format --write src/data/leaderboard.json
          npx tsc --noEmit
          npm run build

      # Copy Astro output into docs/
      - name: Deploy Astro site
        run: |
          rm -rf docs/index.html docs/leaderboard docs/leaderboard.json
          cp -r site/dist/* docs/

      - name: Create PR if changed
        run: |
          git diff --quiet docs/ && echo "No changes to docs/" && exit 0

          BRANCH="auto/regenerate-pages"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add docs/
          git commit -m "chore: auto-regenerate GitHub Pages leaderboard"
          git push -f origin "$BRANCH"

          # Close any existing PR from this branch before creating a new one
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING_PR" ]; then
            gh pr close "$EXISTING_PR" --delete-branch=false
          fi

          gh pr create \
            --title "chore: auto-regenerate GitHub Pages leaderboard" \
            --body "Automated update of \`docs/\` from the Astro build pipeline.

          Triggered by a push to \`main\` that changed site sources or leaderboard results." \
            --head "$BRANCH" \
            --base main

          gh pr merge "$BRANCH" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
