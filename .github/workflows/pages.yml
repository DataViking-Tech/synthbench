name: Regenerate Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/synthbench/publish.py'
      - 'leaderboard-results/**'

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e .
      - run: synthbench publish --results-dir leaderboard-results --output docs/

      - name: Deploy production site to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: true
