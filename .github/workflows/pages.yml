name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/synthbench/publish.py'
      - 'leaderboard-results/**'
      - 'site/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: pip install -e .

      - name: Generate leaderboard data
        run: synthbench publish-data --results-dir leaderboard-results --output site/src/data/leaderboard.json

      - name: Generate run explorer artifacts
        run: synthbench publish-runs --results-dir leaderboard-results --output-dir site/public/data

      - name: Build Astro site
        working-directory: site
        run: |
          npm ci
          npx biome format --write src/data/leaderboard.json
          npx tsc --noEmit
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
