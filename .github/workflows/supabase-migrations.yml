name: Supabase Migrations

# sb-i8yk: auto-apply migrations in supabase/migrations/ to the prod Supabase
# project on merge to main. Replaces the previous discipline violation of
# applying via Supabase MCP. The full rules live in docs/database-migrations.md.
#
# Idempotency: `supabase db push --include-all` only applies migration files
# whose 14-digit version is missing from `supabase_migrations.schema_migrations`
# on the remote. Files already tracked there are skipped, so this workflow is
# safe to re-run on any subset of merged PRs.
#
# Drift detection: after pushing, we list the remote versions and fail if the
# local file count is somehow greater than the remote's (i.e. the push silently
# skipped files it shouldn't have). The reverse — remote having extras that
# are not in-tree — is tolerated because the pre-existing identity-layer and
# touch-updated-at migrations (applied before migration tracking moved in-repo)
# live on the remote only.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serialize migration runs so concurrent merges can't race each other into
  # a split-brain schema_migrations table.
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.12

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      # SUPABASE_ACCESS_TOKEN is a personal access token scoped to the whole
      # Supabase account, so it lives in dataviking-platform/prd alongside
      # other shared credentials (sb-vkz). SUPABASE_PROJECT_REF and
      # SUPABASE_DB_PASSWORD are product-specific and live in synthbench/prd.
      - name: Load Supabase credentials from Doppler
        env:
          DOPPLER_PLATFORM_TOKEN: ${{ secrets.DOPPLER_PLATFORM_TOKEN }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail

          access_token=$(DOPPLER_TOKEN="$DOPPLER_PLATFORM_TOKEN" \
            doppler secrets get SUPABASE_ACCESS_TOKEN \
              --project dataviking-platform --config prd --plain)
          echo "::add-mask::$access_token"
          printf 'SUPABASE_ACCESS_TOKEN<<__SB_EOF__\n%s\n__SB_EOF__\n' \
            "$access_token" >> "$GITHUB_ENV"

          for name in SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            value=$(doppler secrets get "$name" --project synthbench --config prd --plain)
            echo "::add-mask::$value"
            printf '%s<<__SB_EOF__\n%s\n__SB_EOF__\n' "$name" "$value" >> "$GITHUB_ENV"
          done

      - name: Link to remote project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        # --include-all: non-interactive; apply any local migration file not
        # already tracked in remote schema_migrations. Safe to re-run.
        run: supabase db push --include-all

      - name: Verify no local-only drift
        # Parity check: every local migration file (14-digit timestamp prefix)
        # must exist in remote schema_migrations after the push. If not, the
        # push silently skipped a file — fail loud.
        run: |
          set -euo pipefail

          local_versions=$(
            ls supabase/migrations \
              | grep -E '^[0-9]{14}_' \
              | sed 's/_.*$//' \
              | sort -u
          )

          remote_versions=$(
            supabase migration list --linked 2>/dev/null \
              | awk 'NR>2 && $2 ~ /^[0-9]{14}$/ { print $2 }' \
              | sort -u
          )

          missing=$(comm -23 <(printf '%s\n' "$local_versions") <(printf '%s\n' "$remote_versions") || true)
          if [ -n "$missing" ]; then
            echo "::error::Local migrations not present on remote after push:"
            printf '  %s\n' $missing
            exit 1
          fi

          echo "All local migrations are applied on remote."
          printf 'Local:  %s\n' $local_versions
          printf 'Remote: %s\n' $remote_versions
