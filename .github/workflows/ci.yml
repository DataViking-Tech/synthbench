name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - run: pytest tests/

  validate-submissions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Find added / modified submissions
        id: changed
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="$(git rev-parse HEAD^ 2>/dev/null || echo '')"
          fi
          if [[ -z "$base_sha" ]]; then
            changed=""
          else
            changed=$(git diff --name-only --diff-filter=AM "$base_sha" HEAD -- \
              'leaderboard-results/*.json' | tr '\n' ' ')
          fi
          echo "files=$changed" >> "$GITHUB_OUTPUT"
          echo "Submissions to validate: $changed"
      - name: Validate new submissions
        if: steps.changed.outputs.files != ''
        run: synthbench validate ${{ steps.changed.outputs.files }}

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -e .
      - name: Generate leaderboard data
        run: synthbench publish-data --results-dir leaderboard-results --output site/src/data/leaderboard.json
      - name: Generate run explorer artifacts
        run: synthbench publish-runs --results-dir leaderboard-results --output-dir site/public/data
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Format generated data
        working-directory: site
        run: npx biome format --write src/data/leaderboard.json
      - name: Typecheck
        working-directory: site
        run: npx tsc --noEmit
      - name: Biome lint
        working-directory: site
        run: npx biome check .
      - name: Build site
        working-directory: site
        run: npm run build
      - name: Verify deployment artifact
        working-directory: site
        run: |
          echo "Checking site/dist/ matches expected deployment structure..."
          test -d dist || { echo "FAIL: site/dist/ directory missing"; exit 1; }
          test -f dist/index.html || { echo "FAIL: dist/index.html missing"; exit 1; }
          test -d dist/_astro || { echo "FAIL: dist/_astro/ directory missing"; exit 1; }
          test -f dist/favicon.svg || { echo "FAIL: dist/favicon.svg missing"; exit 1; }
          echo "Deployment artifact verified:"
          ls -la dist/
          echo "---"
          ls dist/_astro/ | head -5

  visual:
    # Smoke VRT (sb-o3b): runs in Ubuntu. Baselines live under
    # __screenshots__/desktop-chromium/ and are generated in CI, not on
    # dev machines. Use the `vrt-baseline-update` PR label to regenerate
    # baselines and commit them back to the PR branch automatically.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Writable checkout so the label-triggered update step can commit
          # new baselines back to the PR branch. Falls back to push refs for
          # non-PR events. Cross-repo PRs from forks will skip the commit
          # step (GITHUB_TOKEN is not writable to forks).
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -e .
      - name: Generate leaderboard data
        run: synthbench publish-data --results-dir leaderboard-results --output site/src/data/leaderboard.json
      - name: Generate run explorer artifacts
        run: synthbench publish-runs --results-dir leaderboard-results --output-dir site/public/data
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Install Playwright browsers
        working-directory: site
        run: npx playwright install --with-deps chromium
      - name: Format generated data
        working-directory: site
        run: npx biome format --write src/data/leaderboard.json
      - name: Build site
        working-directory: site
        run: npm run build
      - name: Update baselines (label-triggered)
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'vrt-baseline-update')
        working-directory: site
        env:
          CI: "true"
        run: npx playwright test --config=e2e/playwright.config.ts --update-snapshots smoke.visual
      - name: Commit updated baselines
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'vrt-baseline-update')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/e2e/visual/__screenshots__/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(vrt): update baselines via vrt-baseline-update label"
            git push
          fi
      - name: Run visual regression tests
        working-directory: site
        env:
          CI: "true"
        run: npx playwright test --config=e2e/playwright.config.ts smoke.visual
      - name: Upload VRT report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-report
          path: |
            site/playwright-report/
            site/e2e/test-results/
          retention-days: 14

  merge-ready:
    if: always()
    # `visual` is intentionally NOT a required input: VRT diffs are sensitive
    # to runner-OS font rasterization, and we treat it as a signal that gets
    # investigated per-PR rather than a hard merge gate. Baselines are still
    # committed and the job still runs.
    needs: [lint, test, site, validate-submissions, visual]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.site.result }}" != "success" || "${{ needs.validate-submissions.result }}" != "success" ]]; then
            echo "Required jobs failed"
            exit 1
          fi
          echo "VRT status (advisory): ${{ needs.visual.result }}"
