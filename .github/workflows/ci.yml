name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - run: pytest tests/

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -e .
      - name: Generate leaderboard data
        run: synthbench publish-data --results-dir leaderboard-results --output site/src/data/leaderboard.json
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Format generated data
        working-directory: site
        run: npx biome format --write src/data/leaderboard.json
      - name: Astro check
        working-directory: site
        run: npx astro check
      - name: Biome lint
        working-directory: site
        run: npx biome check .
      - name: Build site
        working-directory: site
        run: npm run build

  merge-ready:
    if: always()
    needs: [lint, test, site]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.site.result }}" != "success" ]]; then
            echo "Required jobs failed"
            exit 1
          fi
