name: Deploy data-proxy Worker

# sb-v09i / sb-svih: build + deploy the synthbench-data-proxy Cloudflare
# Worker to api.synthbench.org.
#
# Runtime config split (sb-svih):
#   - SUPABASE_URL is a plain var (public project URL, not a secret). It is
#     sed-swapped into wrangler.toml before `wrangler deploy` so the deployed
#     [vars] block carries the real value instead of the placeholder "". This
#     avoids the race where the first deploy ships an empty URL and only the
#     follow-up `wrangler secret put` fills it in.
#   - SUPABASE_SERVICE_ROLE_KEY and GITHUB_DISPATCH_TOKEN ARE secrets and go
#     through `wrangler secret put` after deploy (the Worker must exist before
#     a secret name can be set). A rotation in Doppler therefore propagates on
#     the next merge to main.
#
# Mirrors cf-pages.yml for Doppler sourcing: Cloudflare creds live in
# dataviking-platform/prd (shared), Supabase + GitHub-dispatch values live in
# synthbench/prd (product-specific). GITHUB_DISPATCH_TOKEN is treated as
# optional — if it's not yet provisioned in Doppler, the Worker still serves
# /data/* and returns 503 on /submit until the operator adds it.

on:
  push:
    branches: [main]
    paths:
      - 'workers/data-proxy/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serialize deploys so a rapid double-merge can't race two `wrangler deploy`
  # invocations against the same Worker slot.
  group: deploy-data-proxy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Worker dependencies
        working-directory: workers/data-proxy
        run: npm ci

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      # Shared Cloudflare creds live in dataviking-platform/prd (sb-vkz). The
      # token must carry Worker Scripts:Edit + Workers Routes:Edit — the
      # existing cf-pages deploy token may need its scope widened; flag in PR.
      - name: Load Cloudflare creds from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_PLATFORM_TOKEN }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            value=$(doppler secrets get "$name" --project dataviking-platform --config prd --plain)
            echo "::add-mask::$value"
            printf '%s<<__DWK_EOF__\n%s\n__DWK_EOF__\n' "$name" "$value" >> "$GITHUB_ENV"
          done

      # Worker-runtime secrets from synthbench/prd. GITHUB_DISPATCH_TOKEN is
      # allowed to be absent on first rollout: /submit will stay 503 until
      # submitConfigOk() in src/index.ts sees all four dispatch values set,
      # but /data/* still serves. The reconcile step below skips empty values.
      - name: Load Worker-runtime secrets from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          for name in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            value=$(doppler secrets get "$name" --project synthbench --config prd --plain)
            echo "::add-mask::$value"
            printf '%s<<__DWK_EOF__\n%s\n__DWK_EOF__\n' "$name" "$value" >> "$GITHUB_ENV"
          done
          if value=$(doppler secrets get GITHUB_DISPATCH_TOKEN --project synthbench --config prd --plain 2>/dev/null); then
            echo "::add-mask::$value"
            printf 'GITHUB_DISPATCH_TOKEN<<__DWK_EOF__\n%s\n__DWK_EOF__\n' "$value" >> "$GITHUB_ENV"
          else
            echo "::warning::GITHUB_DISPATCH_TOKEN not found in synthbench/prd Doppler — /submit will stay 503 until it is provisioned and this workflow re-runs."
            echo "GITHUB_DISPATCH_TOKEN=" >> "$GITHUB_ENV"
          fi

      # Populate SUPABASE_URL in wrangler.toml before deploy (sb-svih). The
      # committed placeholder is `SUPABASE_URL = ""` so local `wrangler dev`
      # stays inert without Doppler; CI rewrites it to the real project URL so
      # the deployed [vars] block carries the URL from the very first request.
      # sed is idempotent against the empty placeholder — re-running after a
      # manual edit is a no-op. | is used as the delimiter because URLs
      # contain / but not |.
      - name: Populate SUPABASE_URL in wrangler.toml
        working-directory: workers/data-proxy
        env:
          SUPABASE_URL_VALUE: ${{ env.SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL_VALUE}" ]; then
            echo "::error::SUPABASE_URL is empty — refusing to deploy Worker with unconfigured Supabase base URL."
            exit 1
          fi
          sed -i.bak "s|^SUPABASE_URL = \"\"|SUPABASE_URL = \"${SUPABASE_URL_VALUE}\"|g" wrangler.toml
          rm -f wrangler.toml.bak
          echo "wrangler.toml SUPABASE_URL populated (length=${#SUPABASE_URL_VALUE})."

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/data-proxy
          command: deploy

      # Reconcile secrets AFTER deploy (the Worker must exist before
      # `wrangler secret put` will accept the name). Values are piped on
      # stdin so they never touch argv or the command log; empty values are
      # skipped with a warning so a missing GITHUB_DISPATCH_TOKEN doesn't
      # fail the whole run. SUPABASE_URL is intentionally NOT in this list —
      # it is a public var populated at wrangler.toml level above.
      - name: Reconcile Worker secrets
        working-directory: workers/data-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY_VALUE: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_DISPATCH_TOKEN_VALUE: ${{ env.GITHUB_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          put_secret() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "::warning::Skipping wrangler secret put ${name} — empty value (provision in Doppler and re-run this workflow)."
              return 0
            fi
            printf '%s' "$value" | npx --no-install wrangler secret put "$name"
          }
          put_secret SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY_VALUE"
          put_secret GITHUB_DISPATCH_TOKEN "$GITHUB_DISPATCH_TOKEN_VALUE"
